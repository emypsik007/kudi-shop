<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KUDI SHOP | Магазин одежды</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #0a0a1a 50%, #0a0a2a 100%);
            color: #ffffff;
            padding-bottom: 0;
            min-height: 100vh;
        }

        /* Звездный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 60px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 150px 200px, #ffdd99, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 400px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 500px 100px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 700px 600px, #ffaa88, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 800px 300px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 1000px 500px, #ffccaa, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: no-repeat;
            opacity: 0.6;
            z-index: 0;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: rgba(10, 10, 30, 0.7);
            backdrop-filter: blur(2px);
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Шапка - sticky */
        .header {
            background: rgba(20, 20, 50, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(100, 100, 200, 0.3);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #aaccff 0%, #ff99cc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 12px;
            color: #88aaff;
            margin-top: 2px;
        }

        .icons span {
            font-size: 22px;
            cursor: pointer;
            filter: drop-shadow(0 0 5px rgba(100, 100, 255, 0.5));
        }

        /* Поиск */
        .search-section {
            padding: 16px;
            border-bottom: 1px solid rgba(100, 100, 200, 0.2);
        }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(30, 30, 60, 0.8);
            border-radius: 30px;
            padding: 8px 16px;
            border: 1px solid rgba(100, 100, 200, 0.4);
            backdrop-filter: blur(5px);
        }

        .search-icon {
            font-size: 20px;
            color: #88aaff;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: #ffffff;
            padding: 8px 0;
        }

        .search-input::placeholder {
            color: #88aaff;
            opacity: 0.6;
        }

        .clear-search {
            background: rgba(100, 100, 200, 0.3);
            border: none;
            border-radius: 20px;
            padding: 4px 10px;
            color: #ffffff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .clear-search:hover {
            background: rgba(100, 100, 200, 0.6);
        }

        /* Категории */
        .categories {
            padding: 16px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-list {
            display: inline-flex;
            gap: 12px;
        }

        .category-btn {
            background: rgba(30, 30, 60, 0.8);
            border: 1px solid rgba(100, 100, 200, 0.3);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #5f9eff, #8a6eff);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(95, 158, 255, 0.3);
        }

        /* Секция товаров */
        .products-section {
            padding: 0 16px 20px 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            padding: 0 4px;
            background: linear-gradient(135deg, #ffffff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .product-card {
            background: rgba(25, 25, 55, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border: 1px solid rgba(100, 100, 200, 0.2);
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3), 0 0 20px rgba(100, 100, 255, 0.2);
            border-color: rgba(100, 100, 255, 0.5);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: rgba(20, 20, 45, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffffff;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #ffaa66;
            margin: 6px 0;
        }

        .product-category {
            font-size: 11px;
            color: #88aaff;
            text-transform: uppercase;
        }

        .buy-btn {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            background: linear-gradient(135deg, #5f9eff, #8a6eff);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(95, 158, 255, 0.5);
        }

        /* Корзина - sticky панель */
        .cart-bar {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 45, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(100, 100, 200, 0.3);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 480px;
            margin: 0 auto;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .cart-info {
            display: flex;
            gap: 12px;
            align-items: baseline;
        }

        .cart-count {
            background: linear-gradient(135deg, #5f9eff, #8a6eff);
            color: white;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .cart-total {
            font-weight: 700;
            font-size: 18px;
            color: #ffaa66;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #ff66aa, #ff9966);
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkout-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(255, 102, 170, 0.5);
        }

        /* Модальное окно товара */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(30, 30, 60, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            max-width: 340px;
            width: 90%;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(100, 100, 255, 0.5);
        }

        .modal-content h3 {
            color: #ffffff;
            margin-bottom: 12px;
        }

        .modal-content p {
            color: #ffaa66;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal-close {
            background: linear-gradient(135deg, #5f9eff, #8a6eff);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: white;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        /* Сообщение о пустом поиске */
        .no-results {
            grid-column: span 2;
            text-align: center;
            padding: 40px;
            color: #88aaff;
            font-size: 16px;
        }

        @media (max-width: 480px) {
            .products-grid {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>KUDI SHOP</h1>
                    <p>streetwear & essentials</p>
                </div>
                <div class="icons">
                    <span>🛍️</span>
                </div>
            </div>
        </div>

        <!-- Поиск -->
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск товаров...">
                <button class="clear-search" id="clearSearch">✕</button>
            </div>
        </div>

        <div class="categories">
            <div class="category-list" id="categoryList">
                <button class="category-btn active" data-cat="all">Все</button>
                <button class="category-btn" data-cat="hoodie">Худи</button>
                <button class="category-btn" data-cat="tshirt">Футболки</button>
                <button class="category-btn" data-cat="pants">Штаны</button>
                <button class="category-btn" data-cat="accessories">Аксессуары</button>
            </div>
        </div>

        <div class="products-section">
            <div class="section-title">🔥 Новинки</div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <div class="cart-bar" id="cartBar">
            <div class="cart-info">
                <span class="cart-count" id="cartCount">0</span>
                <span class="cart-total" id="cartTotal">0 ₽</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Оформить</button>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalPrice"></p>
            <button class="modal-close" id="modalClose">В корзину</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Данные товаров
        const products = [
            { id: 1, name: "Oversized Hoodie", price: 4990, category: "hoodie", emoji: "🧥", image: "🧥" },
            { id: 2, name: "Cargo Pants", price: 3990, category: "pants", emoji: "👖", image: "👖" },
            { id: 3, name: "Graphic T-Shirt", price: 1990, category: "tshirt", emoji: "👕", image: "👕" },
            { id: 4, name: "Chain Necklace", price: 1290, category: "accessories", emoji: "⛓️", image: "⛓️" },
            { id: 5, name: "Zip Hoodie", price: 5490, category: "hoodie", emoji: "🧥", image: "🧥" },
            { id: 6, name: "Slim Jeans", price: 3590, category: "pants", emoji: "👖", image: "👖" },
            { id: 7, name: "Vintage Tee", price: 1790, category: "tshirt", emoji: "👕", image: "👕" },
            { id: 8, name: "Beanie Hat", price: 890, category: "accessories", emoji: "🧢", image: "🧢" },
            { id: 9, name: "Puffer Jacket", price: 7990, category: "hoodie", emoji: "🧥", image: "🧥" },
            { id: 10, name: "Jogger Pants", price: 3290, category: "pants", emoji: "👖", image: "👖" },
            { id: 11, name: "Space Hoodie", price: 6990, category: "hoodie", emoji: "🚀", image: "🚀" },
            { id: 12, name: "Galaxy Tee", price: 2490, category: "tshirt", emoji: "🌌", image: "🌌" }
        ];

        let cart = [];
        let currentCategory = "all";
        let searchQuery = "";

        // Функция фильтрации товаров
        function getFilteredProducts() {
            let filtered = products;
            
            // Фильтр по категории
            if (currentCategory !== "all") {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            // Фильтр по поиску
            if (searchQuery.trim() !== "") {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(query) ||
                    p.category.toLowerCase().includes(query)
                );
            }
            
            return filtered;
        }

        // Функция рендеринга товаров
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = getFilteredProducts();
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">✨ Товары не найдены<br>Попробуйте изменить поиск</div>';
                return;
            }

            grid.innerHTML = filtered.map(product => `
                <div class="product-card" data-id="${product.id}">
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                        <div class="product-category">${product.category}</div>
                        <button class="buy-btn" data-id="${product.id}">В корзину</button>
                    </div>
                </div>
            `).join('');

            // Добавляем обработчики на кнопки "В корзину"
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    addToCart(id);
                });
            });

            // Добавляем обработчики на карточки для открытия модалки
            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('buy-btn')) return;
                    const id = parseInt(card.dataset.id);
                    showProductModal(id);
                });
            });
        }

        // Добавление в корзину
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            tg.HapticFeedback.impactOccurred('light');
            
            tg.showPopup({
                title: "Добавлено",
                message: `${product.name} в корзине`,
                buttons: [{ type: "ok" }]
            });
        }

        // Обновление UI корзины
        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            document.getElementById('cartCount').innerText = totalItems;
            document.getElementById('cartTotal').innerText = `${totalPrice.toLocaleString()} ₽`;
            
            tg.CloudStorage.setItem('cart', JSON.stringify(cart), (err) => {
                if (err) console.error('CloudStorage error:', err);
            });
        }

        // Показать модальное окно с товаром
        function showProductModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            document.getElementById('modalTitle').innerText = product.name;
            document.getElementById('modalPrice').innerHTML = `${product.price.toLocaleString()} ₽<br><small style="font-size: 12px; color: #88aaff;">Нажмите кнопку чтобы добавить</small>`;
            
            const modal = document.getElementById('productModal');
            modal.style.display = 'flex';
            
            const closeBtn = document.getElementById('modalClose');
            closeBtn.onclick = () => {
                addToCart(productId);
                modal.style.display = 'none';
            };
        }

        // Оформление заказа
        async function checkout() {
            if (cart.length === 0) {
                tg.showPopup({
                    title: "Корзина пуста",
                    message: "Добавьте товары для оформления заказа",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const orderData = {
                action: 'order',
                cart: cart.map(item => ({ id: item.id, name: item.name, quantity: item.quantity, price: item.price })),
                total: total,
                user: tg.initDataUnsafe?.user
            };
            
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        // Загрузка корзины из CloudStorage
        function loadCart() {
            tg.CloudStorage.getItem('cart', (err, value) => {
                if (!err && value) {
                    try {
                        cart = JSON.parse(value);
                        updateCartUI();
                    } catch(e) {
                        console.error('Parse error:', e);
                    }
                }
            });
        }

        // Обновление поиска
        function handleSearch() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value;
            renderProducts();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchQuery = '';
            renderProducts();
        }

        // Инициализация
        function init() {
            loadCart();
            renderProducts();
            
            // Поиск
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', handleSearch);
            document.getElementById('clearSearch').addEventListener('click', clearSearch);
            
            // Категории
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.cat;
                    renderProducts();
                });
            });
            
            // Кнопка оформления
            document.getElementById('checkoutBtn').addEventListener('click', checkout);
            
            // Закрытие модалки при клике вне
            document.getElementById('productModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('productModal')) {
                    document.getElementById('productModal').style.display = 'none';
                }
            });
        }
        
        init();
    </script>
</body>
</html>
