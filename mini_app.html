<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUDI SHOP | Магазин одежды</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d3a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Космический фон со звёздами */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Контейнер приложения */
        .app-container {
            position: relative;
            z-index: 1;
            padding-bottom: 80px;
        }

        /* Шапка */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 24px;
            text-align: center;
            background: linear-gradient(90deg, #00d9ff, #ff00ff);
            /* Исправлено: добавлено стандартное свойство background-clip для совместимости */
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        /* Поиск */
        .search-container {
            padding: 15px 20px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        /* Категории */
        .categories {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .category-btn.active,
        .category-btn:hover {
            background: linear-gradient(90deg, #00d9ff, #ff00ff);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
        }

        /* Секции */
        .section {
            display: none;
            padding: 20px;
        }

        .section.active {
            display: block;
        }

        /* Карточки товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
            border-color: rgba(0, 217, 255, 0.5);
        }

        .product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .product-name {
            font-size: 14px;
            margin: 10px 0 5px;
            color: #ffffff;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-cart {
            background: linear-gradient(90deg, #00d9ff, #0099ff);
            color: #ffffff;
        }

        .btn-favorite {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .btn-favorite.active {
            background: linear-gradient(90deg, #ff0066, #ff6699);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 46, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.6);
        }

        .nav-item.active {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        .nav-item:hover {
            color: #ffffff;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
        }

        /* Корзина */
        .cart-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 217, 255, 0.3);
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #00d9ff, #ff00ff);
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 217, 255, 0.5);
        }

        /* Профиль */
        .profile-section {
            text-align: center;
            padding: 30px 20px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(90deg, #00d9ff, #ff00ff);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }

        .profile-name {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        /* Избранное */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 217, 255, 0.9);
            color: #ffffff;
            padding: 12px 25px;
            border-radius: 25px;
            z-index: 2000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Космический фон -->
    <div class="stars" id="stars"></div>

    <div class="app-container">
        <!-- Шапка -->
        <header class="header">
            <h1>🌌 KUDI SHOP</h1>
        </header>

        <!-- Поиск (только в главной) -->
        <div class="search-container" id="searchContainer">
            <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Поиск товаров...">
        </div>

        <!-- Категории (только в главной) -->
        <div class="categories" id="categoriesContainer">
            <button class="category-btn active" data-category="all">🔥 Все</button>
            <button class="category-btn" data-category="hoodies">👕 Худи</button>
            <button class="category-btn" data-category="tshirts">👕 Футболки</button>
            <button class="category-btn" data-category="pants">👖 Штаны</button>
            <button class="category-btn" data-category="accessories">🎒 Аксессуары</button>
        </div>

        <!-- Главная секция -->
        <section class="section active" id="homeSection">
            <div class="products-grid" id="productsGrid"></div>
        </section>

        <!-- Избранное -->
        <section class="section" id="favoritesSection">
            <h2 style="margin-bottom: 20px;">❤️ Избранное</h2>
            <div class="products-grid" id="favoritesGrid"></div>
            <div class="empty-state" id="favoritesEmpty" style="display: none;">
                <div class="empty-state-icon">💔</div>
                <p>В избранном пока пусто</p>
                <p>Добавляйте товары, нажимая на сердечко</p>
            </div>
        </section>

        <!-- Корзина -->
        <section class="section" id="cartSection">
            <h2 style="margin-bottom: 20px;">🛒 Корзина</h2>
            <div id="cartItems"></div>
            <div class="empty-state" id="cartEmpty" style="display: none;">
                <div class="empty-state-icon">🛒</div>
                <p>Корзина пуста</p>
                <p>Добавьте товары для оформления заказа</p>
            </div>
            <div id="cartSummary" style="display: none;">
                <div style="text-align: right; margin: 20px 0; font-size: 18px;">
                    Итого: <span id="cartTotal" style="color: #00d9ff; font-weight: bold;">0 ₽</span>
                </div>
                <button class="checkout-btn" onclick="checkout()">✅ Оформить заказ</button>
            </div>
        </section>

        <!-- Профиль -->
        <section class="section" id="profileSection">
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <h2 class="profile-name" id="profileName">Гость</h2>
                <p style="color: rgba(255,255,255,0.6);">@username</p>
                
                <div class="profile-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="statOrders">0</div>
                        <div class="stat-label">Заказов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statFavorites">0</div>
                        <div class="stat-label">Избранное</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statSpent">0 ₽</div>
                        <div class="stat-label">Потрачено</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" data-section="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </div>
            <div class="nav-item" data-section="favorites">
                <span class="nav-icon">❤️</span>
                <span class="nav-label">Избранное</span>
            </div>
            <div class="nav-item" data-section="cart">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">Корзина</span>
            </div>
            <div class="nav-item" data-section="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Профиль</span>
            </div>
        </div>
    </nav>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные пользователя
        const user = tg.initDataUnsafe?.user || {
            first_name: 'Гость',
            username: 'guest'
        };

        // База данных товаров
        const products = [
            { id: 1, name: 'Худи "Космическая пыль"', price: 2990, category: 'hoodies', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Худи' },
            { id: 2, name: 'Футболка "Небесная механика"', price: 1990, category: 'tshirts', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Футболка' },
            { id: 3, name: 'Джоггеры "Галактический ветер"', price: 2490, category: 'pants', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Джоггеры' },
            { id: 4, name: 'Худи "Туманность"', price: 3290, category: 'hoodies', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Худи+2' },
            { id: 5, name: 'Футболка "Звёздный путь"', price: 2190, category: 'tshirts', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Футболка+2' },
            { id: 6, name: 'Шорты "Орбита"', price: 1790, category: 'pants', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Шорты' },
            { id: 7, name: 'Кепка "Астронавт"', price: 990, category: 'accessories', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Кепка' },
            { id: 8, name: 'Рюкзак "Космос"', price: 3490, category: 'accessories', image: 'https://via.placeholder.com/300x300/1a1a4e/00d9ff?text=Рюкзак' }
        ];

        // Состояние приложения
        let cart = JSON.parse(localStorage.getItem('kudi_cart')) || [];
        let favorites = JSON.parse(localStorage.getItem('kudi_favorites')) || [];
        let currentCategory = 'all';

        // Создание звёздного фона
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Рендер товаров
        function renderProducts(productsToRender, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (productsToRender.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🔍</div>
                        <p>Товары не найдены</p>
                    </div>
                `;
                return;
            }

            productsToRender.forEach(product => {
                const isFavorite = favorites.includes(product.id);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <h3 class="product-name">${product.name}</h3>
                    <p class="product-price">${product.price} ₽</p>
                    <div class="product-actions">
                        <button class="btn btn-cart" onclick="addToCart(${product.id})">🛒 В корзину</button>
                        <button class="btn btn-favorite ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(${product.id})">
                            ${isFavorite ? '❤️' : '🤍'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Рендер избранного
        function renderFavorites() {
            const favoriteProducts = products.filter(p => favorites.includes(p.id));
            renderProducts(favoriteProducts, 'favoritesGrid');
            
            const emptyState = document.getElementById('favoritesEmpty');
            emptyState.style.display = favoriteProducts.length === 0 ? 'block' : 'none';
            
            document.getElementById('statFavorites').textContent = favoriteProducts.length;
        }

        // Рендер корзины
        function renderCart() {
            const container = document.getElementById('cartItems');
            const emptyState = document.getElementById('cartEmpty');
            const summary = document.getElementById('cartSummary');
            
            container.innerHTML = '';

            if (cart.length === 0) {
                emptyState.style.display = 'block';
                summary.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            summary.style.display = 'block';

            let total = 0;

            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (!product) return;

                total += product.price * item.quantity;

                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="cart-item-image">
                    <div class="cart-item-info">
                        <h4>${product.name}</h4>
                        <p style="color: #00d9ff;">${product.price} ₽</p>
                        <div class="cart-item-quantity">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(cartItem);
            });

            document.getElementById('cartTotal').textContent = total + ' ₽';
        }

        // Обновление профиля
        function updateProfile() {
            document.getElementById('profileName').textContent = user.first_name || 'Гость';
            document.querySelector('#profileName + p').textContent = user.username ? '@' + user.username : '@guest';
            
            if (user.photo_url) {
                document.getElementById('profileAvatar').innerHTML = `<img src="${user.photo_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            }
        }

        // Добавление в корзину
        function addToCart(productId) {
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ id: productId, quantity: 1 });
            }

            localStorage.setItem('kudi_cart', JSON.stringify(cart));
            renderCart();
            showNotification('✅ Товар добавлен в корзину');
        }

        // Обновление количества
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (!item) return;

            item.quantity += change;

            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== productId);
            }

            localStorage.setItem('kudi_cart', JSON.stringify(cart));
            renderCart();
        }

        // Переключение избранного
        function toggleFavorite(productId) {
            const index = favorites.indexOf(productId);
            
            if (index === -1) {
                favorites.push(productId);
                showNotification('❤️ Добавлено в избранное');
            } else {
                favorites.splice(index, 1);
                showNotification('🤍 Удалено из избранного');
            }

            localStorage.setItem('kudi_favorites', JSON.stringify(favorites));
            renderProducts(products.filter(p => currentCategory === 'all' || p.category === currentCategory), 'productsGrid');
            renderFavorites();
            updateProfile();
        }

        // Переключение секций
        function switchSection(sectionName) {
            // Обновляем навигацию
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.section === sectionName);
            });

            // Обновляем секции
            document.querySelectorAll('.section').forEach(section => {
                section.classList.toggle('active', section.id === sectionName + 'Section');
            });

            // Показываем/скрываем поиск и категории
            const searchContainer = document.getElementById('searchContainer');
            const categoriesContainer = document.getElementById('categoriesContainer');
            
            if (sectionName === 'home') {
                searchContainer.style.display = 'block';
                categoriesContainer.style.display = 'flex';
            } else {
                searchContainer.style.display = 'none';
                categoriesContainer.style.display = 'none';
            }

            // Рендерим контент секций
            if (sectionName === 'favorites') {
                renderFavorites();
            } else if (sectionName === 'cart') {
                renderCart();
            } else if (sectionName === 'profile') {
                updateProfile();
            }
        }

        // Оформление заказа
        function checkout() {
            if (cart.length === 0) {
                showNotification('⚠️ Корзина пуста');
                return;
            }

            const orderData = {
                action: 'order',
                user: user,
                cart: cart.map(item => {
                    const product = products.find(p => p.id === item.id);
                    return {
                        name: product.name,
                        price: product.price,
                        quantity: item.quantity
                    };
                }),
                total: cart.reduce((sum, item) => {
                    const product = products.find(p => p.id === item.id);
                    return sum + (product.price * item.quantity);
                }, 0)
            };

            tg.sendData(JSON.stringify(orderData));
        }

        // Уведомления
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        // Поиск товаров
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                (currentCategory === 'all' || p.category === currentCategory) &&
                p.name.toLowerCase().includes(query)
            );
            renderProducts(filtered, 'productsGrid');
        });

        // Фильтрация по категориям
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                
                const query = document.getElementById('searchBar').value.toLowerCase();
                const filtered = products.filter(p => 
                    (currentCategory === 'all' || p.category === currentCategory) &&
                    p.name.toLowerCase().includes(query)
                );
                renderProducts(filtered, 'productsGrid');
            });
        });

        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                switchSection(item.dataset.section);
            });
        });

        // Инициализация
        createStars();
        renderProducts(products, 'productsGrid');
        renderFavorites();
        renderCart();
        updateProfile();

        // Настройка цветов Telegram
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#0a0a2e');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#ffffff');
    </script>
</body>
</html>
