<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUDI SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); margin: 0; padding: 0; padding-bottom: 60px; }
        header { background: var(--tg-theme-button-color, #3390ec); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; justify-content: space-around; background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 10px 0; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ccc; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 2px; }
        .page { display: none; padding: 10px; }
        .page.active { display: block; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: var(--tg-theme-secondary-bg-color, #f9f9f9); }
        .product-img { width: 100%; height: 150px; object-fit: cover; }
        .product-info { padding: 8px; }
        .product-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .product-price { color: var(--tg-theme-button-color, #3390ec); font-weight: bold; }
        .add-btn { background: var(--tg-theme-button-color, #3390ec); color: white; border: none; width: 100%; padding: 5px; margin-top: 5px; border-radius: 4px; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .empty-msg { text-align: center; color: #888; margin-top: 50px; }
        .checkout-btn { background: #28a745; color: white; width: 100%; padding: 15px; border: none; font-size: 16px; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; }
        .filter-btn { padding: 8px 12px; margin: 5px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; }
        .filter-btn.active { background: var(--tg-theme-button-color, #3390ec); color: white; border-color: var(--tg-theme-button-color, #3390ec); }
        .filters { display: flex; overflow-x: auto; padding: 10px 0; }
    </style>
</head>
<body>

<header>🌌 KUDI SHOP</header>

<!-- Главная -->
<div id="home" class="page active">
    <div class="filters" id="categoryFilters">
        <button class="filter-btn active" data-cat="all">Все</button>
        <!-- Категории добавятся динамически -->
    </div>
    <div class="product-grid" id="productsContainer">
        <!-- Товары -->
    </div>
</div>

<!-- Избранное (заглушка) -->
<div id="favorites" class="page">
    <div class="empty-msg">❤️ Избранное пока пусто</div>
</div>

<!-- Корзина -->
<div id="cart" class="page">
    <div id="cartItems"></div>
    <div style="margin-top: 20px; font-weight: bold; text-align: right;">Итого: <span id="cartTotal">0</span> ₽</div>
    <button class="checkout-btn" onclick="checkout()">✅ Оформить заказ</button>
</div>

<!-- Профиль -->
<div id="profile" class="page">
    <div style="text-align: center; margin-top: 20px;">
        <div style="font-size: 40px;">👤</div>
        <h3 id="userName">Гость</h3>
        <p id="userUsername">@username</p>
        <p>0 Заказов | 0 ₽ Потрачено</p>
    </div>
</div>

<!-- Навигация -->
<div class="nav">
    <div class="nav-item" onclick="showPage('home')"><span class="nav-icon">🏠</span>Главная</div>
    <div class="nav-item" onclick="showPage('favorites')"><span class="nav-icon">❤️</span>Избранное</div>
    <div class="nav-item" onclick="showPage('cart')"><span class="nav-icon">🛒</span>Корзина</div>
    <div class="nav-item" onclick="showPage('profile')"><span class="nav-icon">👤</span>Профиль</div>
</div>

<script>
    // !!! ВАЖНО: Укажите здесь адрес вашего сервера, где запущен бот !!!
    // Если бот на локальном ПК, используйте ngrok или аналогичный сервис для получения HTTPS ссылки
    const API_URL = 'http://localhost:8080'; 
    
    const tg = window.Telegram.WebApp;
    tg.expand();

    let products = [];
    let cart = [];
    let currentCategory = 'all';

    // Инициализация
    async function init() {
        // Данные пользователя
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('userName').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('userUsername').innerText = tg.initDataUnsafe.user.username ? '@' + tg.initDataUnsafe.user.username : '@username';
        }

        await loadProducts();
    }

    // Загрузка товаров
    async function loadProducts() {
        try {
            const response = await fetch(`${API_URL}/api/products`);
            products = await response.json();
            renderProducts();
            renderFilters();
        } catch (e) {
            document.getElementById('productsContainer').innerHTML = '<div class="empty-msg">Ошибка загрузки товаров.<br>Проверьте настройки API_URL.</div>';
            console.error(e);
        }
    }

    // Рендер фильтров
    function renderFilters() {
        const categories = [...new Set(products.map(p => p.category))];
        const container = document.getElementById('categoryFilters');
        // Сохраняем кнопку "Все"
        container.innerHTML = '<button class="filter-btn active" data-cat="all" onclick="setCategory(\'all\')">Все</button>';
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.innerText = cat;
            btn.dataset.cat = cat;
            btn.onclick = () => setCategory(cat);
            container.appendChild(btn);
        });
    }

    // Фильтрация
    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.filter-btn[data-cat="${cat}"]`).classList.add('active');
        renderProducts();
    }

    // Рендер товаров
    function renderProducts() {
        const container = document.getElementById('productsContainer');
        container.innerHTML = '';
        
        const filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-msg">Товаров нет</div>';
            return;
        }

        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${p.image}" class="product-img" alt="${p.name}">
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} ₽</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">В корзину</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Корзина
    function addToCart(id) {
        const product = products.find(p => p.id === id);
        const existing = cart.find(item => item.id === id);
        
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartUI();
        tg.HapticFeedback.impactOccurred('light');
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        container.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = '<div class="empty-msg">Корзина пуста</div>';
        } else {
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <b>${item.name}</b><br>
                        ${item.price} ₽ x ${item.quantity}
                    </div>
                    <div style="color: red; cursor: pointer;" onclick="removeFromCart(${index})">✕</div>
                `;
                container.appendChild(div);
            });
        }
        document.getElementById('cartTotal').innerText = total;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    // Оформление заказа
    function checkout() {
        if (cart.length === 0) {
            tg.showAlert("Корзина пуста!");
            return;
        }

        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const data = {
            action: 'order',
            cart: cart,
            total: total
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    }

    // Навигация
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // Старт
    init();
</script>

</body>
</html>
